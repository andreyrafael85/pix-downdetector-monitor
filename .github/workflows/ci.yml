name: CI — PIX DownDetector Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================================================
  # JOB 1: Lint & Format Check
  # ============================================================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🎨 Check code format (black)
        run: black --check --diff src/ tests/

      - name: 📋 Check import order (isort)
        run: isort --check-only --diff src/ tests/

      - name: 🔎 Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__

  # ============================================================================
  # JOB 2: Type Check
  # ============================================================================
  typecheck:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🔬 Run mypy
        run: mypy src/downdetector_monitor/

  # ============================================================================
  # JOB 3: Tests
  # ============================================================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🧪 Run pytest with coverage
        env:
          # Use placeholder values for unit tests (mocked)
          AUTH: brd-customer-test:test-password
          DT_URL: https://test.live.dynatrace.com
          DT_API_TOKEN: dt0c01.test-token
        run: |
          pytest tests/ \
            --cov=src/downdetector_monitor \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: 📊 Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # JOB 4: Security Scan
  # ============================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install bandit
        run: pip install bandit[toml]

      - name: 🔒 Run bandit (security linter)
        run: bandit -r src/ -ll

  # ============================================================================
  # JOB 5: Build Docker Image (apenas na main)
  # ============================================================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, typecheck, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image (test build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pix-downdetector-monitor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
