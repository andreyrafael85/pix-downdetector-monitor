version: "3.9"

services:
  monitor:
    build:
      context: .
      target: production
    image: pix-downdetector-monitor:latest
    container_name: pix-downdetector-monitor
    restart: unless-stopped

    # Load credentials from .env file (never hardcode!)
    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    volumes:
      # Persist screenshots for debugging
      - screenshots:/tmp/downdetector

    # Run every 5 minutes via external scheduler (cron) or adjust restart policy
    # For scheduled runs, use: docker run --rm pix-downdetector-monitor
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  screenshots:
    driver: local
